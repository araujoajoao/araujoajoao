<svg width="680" viewBox="0 0 680 282" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Terminal profile — João Araújo</title>
  <desc>Terminal window showing DevOps profile info</desc>

  <rect width="680" height="282" rx="10" fill="#000000"/>

  <rect width="680" height="38" rx="10" fill="#111111"/>
  <rect y="24" width="680" height="14" fill="#111111"/>

  <circle cx="24" cy="19" r="6" fill="#f7768e"/>
  <circle cx="44" cy="19" r="6" fill="#e0af68"/>
  <circle cx="64" cy="19" r="6" fill="#9ece6a"/>

  <text x="340" y="24" text-anchor="middle" font-family="monospace" font-size="12" fill="#565f89">joao@devops: ~</text>

  <text x="32" y="68" font-family="monospace" font-size="13" font-weight="bold" fill="#565f89">$</text>
  <text x="44" y="68" font-family="monospace" font-size="13" font-weight="bold" fill="#c0caf5">whoami</text>

  <text x="32" y="90" font-family="monospace" font-size="13" font-weight="bold" fill="#bb9af7">João Araújo</text>
  <text x="148" y="90" font-family="monospace" font-size="13" font-weight="bold" fill="#565f89">—</text>
  <text x="162" y="90" font-family="monospace" font-size="13" font-weight="bold" fill="#7dcfff">DevOps · SysAdmin · SRE · Cloud</text>

  <text x="32" y="112" font-family="monospace" font-size="13" font-weight="bold" fill="#565f89">$</text>
  <text x="44" y="112" font-family="monospace" font-size="13" font-weight="bold" fill="#c0caf5">ls skills/</text>

  <text x="32"  y="134" font-family="monospace" font-size="13" font-weight="bold" fill="#9ece6a">datadog</text>
  <text x="110" y="134" font-family="monospace" font-size="13" font-weight="bold" fill="#9ece6a">docker</text>
  <text x="184" y="134" font-family="monospace" font-size="13" font-weight="bold" fill="#9ece6a">kubernetes</text>
  <text x="290" y="134" font-family="monospace" font-size="13" font-weight="bold" fill="#9ece6a">terraform</text>
  <text x="388" y="134" font-family="monospace" font-size="13" font-weight="bold" fill="#9ece6a">python</text>
  <text x="454" y="134" font-family="monospace" font-size="13" font-weight="bold" fill="#9ece6a">bash</text>
  <text x="502" y="134" font-family="monospace" font-size="13" font-weight="bold" fill="#9ece6a">git</text>

  <text x="32" y="156" font-family="monospace" font-size="13" font-weight="bold" fill="#565f89">
    <animate attributeName="opacity" values="1;0;1" dur="1.4s" repeatCount="indefinite"/>loading...
  </text>

  <text x="32" y="178" font-family="monospace" font-size="13" font-weight="bold" fill="#565f89">$</text>
  <text x="44" y="178" font-family="monospace" font-size="13" font-weight="bold" fill="#c0caf5">echo $MOTTO</text>

  <text x="32" y="200" font-family="monospace" font-size="13" font-weight="bold" fill="#e0af68">"You can't improve what you don't measure."</text>

  <text x="32" y="222" font-family="monospace" font-size="13" font-weight="bold" fill="#565f89">$</text>
  <rect x="44" y="210" width="9" height="14" fill="#bb9af7" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <line x1="0" y1="244" x2="680" y2="244" stroke="#111111" stroke-width="1"/>
  <text x="340" y="265" text-anchor="middle" font-family="monospace" font-size="11" fill="#565f89">built with </text>
  <text x="400" y="265" font-family="monospace" font-size="11" fill="#CC785C">Claude Code</text>
</svg>
